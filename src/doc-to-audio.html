<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doc to Audio — BPM Software Solutions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #161b27;
      --border:    #1e2533;
      --border2:   #252d3d;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --accent:    #2563eb;
      --accent-h:  #3b72f0;
      --success:   #22c55e;
      --warn:      #f59e0b;
      --error:     #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-icon {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .header-text h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .header-text p  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .back-link {
      margin-left: auto;
      font-size: 12px; color: var(--muted);
      text-decoration: none; display: flex; align-items: center; gap: 4px;
    }
    .back-link:hover { color: var(--text); }

    /* ── Layout ── */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 0;
      overflow: hidden;
    }

    /* ── Editor pane ── */
    .editor-pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .editor-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .field-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; }
    .title-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 7px;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      padding: 7px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .title-input:focus { border-color: var(--accent); }
    .title-input::placeholder { color: var(--muted); font-weight: 400; }

    .editor-wrap { flex: 1; position: relative; overflow: hidden; }
    .editor-area {
      width: 100%; height: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 13.5px;
      line-height: 1.75;
      padding: 20px 24px;
      resize: none;
      outline: none;
      overflow-y: auto;
    }
    .editor-area::placeholder { color: var(--muted); font-family: -apple-system, sans-serif; font-size: 14px; }
    .editor-footer {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .count-badge { font-size: 12px; color: var(--muted); }
    .count-badge span { color: #94a3b8; }

    /* ── Control pane ── */
    .control-pane {
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
      padding: 24px 22px;
    }
    .section { margin-bottom: 24px; }
    .section-label {
      font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    /* Voice select */
    .option-group { display: flex; flex-direction: column; gap: 7px; }
    .radio-card {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 8px; padding: 10px 12px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .radio-card:hover { border-color: #334155; }
    .radio-card input { accent-color: var(--accent); flex-shrink: 0; }
    .radio-card .voice-name { font-size: 13px; font-weight: 500; }
    .radio-card .voice-desc { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .radio-card.selected { border-color: var(--accent); background: rgba(37, 99, 235, 0.07); }

    /* Speed */
    .speed-row { display: flex; align-items: center; gap: 10px; }
    .speed-slider { flex: 1; accent-color: var(--accent); }
    .speed-val { font-size: 13px; color: #94a3b8; min-width: 36px; text-align: right; }

    /* Generate button */
    .generate-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .generate-btn:hover:not(:disabled) { background: var(--accent-h); }
    .generate-btn:active:not(:disabled) { transform: scale(0.98); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Status card */
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 16px;
      display: none;
    }
    .status-card.visible { display: block; }
    .status-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
    }
    .status-dot.queued   { background: var(--warn); animation: pulse 1.4s infinite; }
    .status-dot.working  { background: var(--accent); animation: pulse 1s infinite; }
    .status-dot.ready    { background: var(--success); }
    .status-dot.error    { background: var(--error); }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.35; }
    }
    .status-label { font-size: 13px; font-weight: 500; }
    .status-detail { font-size: 12px; color: #94a3b8; line-height: 1.6; }
    .status-detail.is-error { color: #fca5a5; }
    .status-error-code { font-size: 10px; color: #ef4444; font-family: monospace; margin-top: 5px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 4px; padding: 4px 7px; word-break: break-all; display: none; }
    .status-error-code.visible { display: block; }
    .status-id { font-size: 10px; color: #334155; margin-top: 8px; font-family: monospace; word-break: break-all; }

    /* Download button */
    .download-btn {
      width: 100%;
      margin-top: 12px;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.35);
      color: var(--success);
      border-radius: 8px;
      font-size: 14px; font-weight: 600;
      padding: 11px;
      cursor: pointer;
      display: none; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.15s;
      text-decoration: none;
    }
    .download-btn.visible { display: flex; }
    .download-btn:hover { background: rgba(34, 197, 94, 0.2); }

    /* History */
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .history-item .hi-icon { font-size: 14px; flex-shrink: 0; }
    .history-item .hi-title { font-size: 12px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-item .hi-dl {
      font-size: 11px; color: var(--accent); cursor: pointer; flex-shrink: 0;
      background: none; border: none; padding: 0; text-decoration: underline;
    }
    .history-item .hi-dl:hover { color: var(--accent-h); }
    .history-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 12px 0; }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 4px 0 20px; }

    /* Quality toggle */
    .seg-toggle { display: flex; gap: 6px; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 4px; }
    .seg-toggle button {
      flex: 1; background: transparent; border: none; color: var(--muted);
      font-size: 12px; font-weight: 600; padding: 7px 8px; border-radius: 6px;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .seg-toggle button .seg-sub { display: block; font-size: 10px; font-weight: 400; color: var(--muted); margin-top: 2px; }
    .seg-toggle button.active { background: rgba(37, 99, 235, 0.16); color: var(--text); }
    .seg-toggle button.active .seg-sub { color: #94a3b8; }

    /* Inline audio player */
    .player-wrap { margin-top: 14px; display: none; }
    .player-wrap.visible { display: block; }
    audio.stream-player { width: 100%; height: 38px; margin-top: 4px; }
    .ttfa-badge { font-size: 11px; color: var(--success); margin-top: 8px; display: none; }
    .ttfa-badge.visible { display: block; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-icon">🎙️</div>
  <div class="header-text">
    <h1>Doc to Audio</h1>
    <p>Paste text, press Play — streams instantly while it renders</p>
  </div>
  <a class="back-link" href="/">← Launcher</a>
</header>

<main class="main">

  <!-- Editor -->
  <div class="editor-pane">
    <div class="editor-toolbar">
      <span class="field-label">Title</span>
      <input
        id="titleInput"
        class="title-input"
        type="text"
        placeholder="Enter a title for this audio…"
        data-testid="input-title"
      />
    </div>
    <div class="editor-wrap">
      <textarea
        id="editorArea"
        class="editor-area"
        placeholder="Paste your markdown or plain text here…

The AI engine will read it aloud, converting headings to natural speech pauses, bullet points to flowing sentences, and code blocks to narrated descriptions."
        data-testid="input-markdown"
        spellcheck="false"
      ></textarea>
    </div>
    <div class="editor-footer">
      <span class="count-badge">Words: <span id="wordCount">0</span></span>
      <span class="count-badge">Chars: <span id="charCount">0</span></span>
      <span class="count-badge" id="estDuration"></span>
    </div>
  </div>

  <!-- Controls -->
  <div class="control-pane">

    <div class="section">
      <div class="section-label">Voice</div>
      <div class="option-group" id="voiceGroup">
        <label class="radio-card selected" data-voice="onyx">
          <input type="radio" name="voice" value="onyx" checked />
          <div>
            <div class="voice-name">Onyx</div>
            <div class="voice-desc">Deep, resonant — great for narration</div>
          </div>
        </label>
        <label class="radio-card" data-voice="alloy">
          <input type="radio" name="voice" value="alloy" />
          <div>
            <div class="voice-name">Alloy</div>
            <div class="voice-desc">Balanced, neutral</div>
          </div>
        </label>
        <label class="radio-card" data-voice="nova">
          <input type="radio" name="voice" value="nova" />
          <div>
            <div class="voice-name">Nova</div>
            <div class="voice-desc">Warm, conversational</div>
          </div>
        </label>
        <label class="radio-card" data-voice="echo">
          <input type="radio" name="voice" value="echo" />
          <div>
            <div class="voice-name">Echo</div>
            <div class="voice-desc">Clear, authoritative</div>
          </div>
        </label>
        <label class="radio-card" data-voice="fable">
          <input type="radio" name="voice" value="fable" />
          <div>
            <div class="voice-name">Fable</div>
            <div class="voice-desc">Expressive, storytelling</div>
          </div>
        </label>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Quality</div>
      <div class="seg-toggle" id="qualityToggle">
        <button type="button" data-quality="hd" class="active">
          HD<span class="seg-sub">richer voice</span>
        </button>
        <button type="button" data-quality="fast">
          Fast<span class="seg-sub">lower latency</span>
        </button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Speed</div>
      <div class="speed-row">
        <input id="speedSlider" class="speed-slider" type="range" min="0.5" max="2.0" step="0.05" value="1.0" data-testid="input-speed" />
        <span class="speed-val" id="speedVal">1.0×</span>
      </div>
    </div>

    <button id="generateBtn" class="generate-btn" data-testid="button-generate">
      <span id="generateIcon">▶</span>
      <span id="generateLabel">Play</span>
    </button>

    <!-- Inline streaming player -->
    <div id="playerWrap" class="player-wrap">
      <audio id="player" class="stream-player" controls preload="none" data-testid="audio-player"></audio>
      <div id="ttfaBadge" class="ttfa-badge"></div>
    </div>

    <div class="divider" style="margin-top:18px;"></div>

    <!-- Status -->
    <div id="statusCard" class="status-card">
      <div class="status-header">
        <div id="statusDot" class="status-dot"></div>
        <span id="statusLabel" class="status-label">—</span>
      </div>
      <div id="statusDetail" class="status-detail"></div>
      <div id="statusErrorCode" class="status-error-code"></div>
      <div id="statusId" class="status-id"></div>
    </div>

    <a id="downloadBtn" class="download-btn" data-testid="button-download" download>
      ⬇ Download MP3
    </a>

    <div class="divider" style="margin:20px 0 16px;"></div>

    <!-- History -->
    <div class="section-label">Recent Renders</div>
    <div id="historyList" class="history-list">
      <div class="history-empty">No renders yet this session</div>
    </div>

  </div>
</main>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let currentToken = null;
  let streamStartedAt = 0;
  let firstAudioShown = false;
  let currentCached = false;
  let selectedQuality = 'hd';
  const history = [];

  // iOS Safari requires blob URLs for audio — it rejects chunked streaming responses
  // because they lack Content-Length / Accept-Ranges headers.
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

  // ── DOM ───────────────────────────────────────────────────────────────────
  const titleInput    = document.getElementById('titleInput');
  const editorArea    = document.getElementById('editorArea');
  const wordCount     = document.getElementById('wordCount');
  const charCount     = document.getElementById('charCount');
  const estDuration   = document.getElementById('estDuration');
  const speedSlider   = document.getElementById('speedSlider');
  const speedVal      = document.getElementById('speedVal');
  const qualityToggle = document.getElementById('qualityToggle');
  const generateBtn   = document.getElementById('generateBtn');
  const generateIcon  = document.getElementById('generateIcon');
  const generateLabel = document.getElementById('generateLabel');
  const playerWrap    = document.getElementById('playerWrap');
  const player        = document.getElementById('player');
  const ttfaBadge     = document.getElementById('ttfaBadge');
  const statusCard      = document.getElementById('statusCard');
  const statusDot       = document.getElementById('statusDot');
  const statusLabel     = document.getElementById('statusLabel');
  const statusDetail    = document.getElementById('statusDetail');
  const statusErrorCode = document.getElementById('statusErrorCode');
  const statusId        = document.getElementById('statusId');
  const downloadBtn   = document.getElementById('downloadBtn');
  const historyList   = document.getElementById('historyList');

  // ── Counters ───────────────────────────────────────────────────────────────
  function updateCounts() {
    const text = editorArea.value;
    const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
    const chars = text.length;
    wordCount.textContent = words.toLocaleString();
    charCount.textContent = chars.toLocaleString();
    const speed = parseFloat(speedSlider.value);
    const estSec = Math.round((words / 140) * 60 / speed);
    if (words > 0) {
      const m = Math.floor(estSec / 60), s = estSec % 60;
      estDuration.textContent = `Est. ~${m > 0 ? m + 'm ' : ''}${s}s audio`;
    } else {
      estDuration.textContent = '';
    }
  }
  editorArea.addEventListener('input', updateCounts);
  speedSlider.addEventListener('input', () => {
    speedVal.textContent = parseFloat(speedSlider.value).toFixed(2).replace(/0$/, '') + '×';
    updateCounts();
  });

  // ── Voice selection ────────────────────────────────────────────────────────
  document.getElementById('voiceGroup').addEventListener('change', (e) => {
    document.querySelectorAll('.radio-card').forEach(c => c.classList.remove('selected'));
    if (e.target.closest('.radio-card')) e.target.closest('.radio-card').classList.add('selected');
  });

  // ── Quality toggle ───────────────────────────────────────────────────────────
  qualityToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-quality]');
    if (!btn) return;
    selectedQuality = btn.dataset.quality;
    qualityToggle.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
  });

  // ── Streaming playback ───────────────────────────────────────────────────────
  // Replaces the legacy submit→poll→download flow. We ask the server to chunk
  // the text (POST /api/prepare), then point the <audio> element at the streaming
  // endpoint. Playback begins as soon as the first chunk is synthesized; the
  // browser buffers the remaining chunks while the server is still rendering them.
  async function startStream(text, title, voice, speed, quality) {
    setStatus('working', 'Preparing…', 'Chunking the document.');
    try {
      const res = await fetch('/api/prepare', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ text, title, voice, speed, quality }),
      });
      const data = await res.json();
      if (!res.ok) {
        setStatus('error', 'Could not start', data.message || 'Request failed');
        setGenerating(false);
        return;
      }

      currentToken = data.token;
      currentCached = !!data.cached;
      statusId.textContent =
        `${data.chunk_count} chunks · ${data.char_count.toLocaleString()} chars · ${data.model}`;

      firstAudioShown = false;
      streamStartedAt = performance.now();
      ttfaBadge.classList.remove('visible');
      downloadBtn.classList.remove('visible');
      playerWrap.classList.add('visible');

      if (currentCached) {
        // Cached: serve via send_file which supports range requests (works on iOS).
        const kb = data.cached_kb ? ` (${data.cached_kb.toLocaleString()} KB)` : '';
        setStatus('working', 'Cached', `Reusing the saved MP3${kb} — no generation.`);
        player.src = `/api/stream/${currentToken}`;
        player.load();
      } else if (isIOS) {
        // iOS Safari cannot play a chunked streaming response — it needs a blob URL
        // with a known Content-Length. Fetch the whole stream first, then hand it
        // to the audio element as an object URL. This loses live streaming on iOS
        // but is the only way to make it work at all on that platform.
        setStatus('working', 'Generating…', 'iOS detected — downloading audio before playback…');
        try {
          const resp = await fetch(`/api/stream/${currentToken}`);
          if (!resp.ok) throw new Error(`Stream error ${resp.status}`);
          const blob = await resp.blob();
          const blobUrl = URL.createObjectURL(blob);
          player.src = blobUrl;
          player.load();
          streamStartedAt = performance.now(); // reset timer to playback start
        } catch (fetchErr) {
          setStatus('error', 'Network error',
            'Could not fetch audio. Is the server running?', fetchErr.message);
          setGenerating(false);
          return;
        }
      } else {
        // Desktop/Android: point the audio element straight at the streaming
        // endpoint — it starts playing as soon as the first chunk arrives.
        setStatus('working', 'Buffering…', 'Generating the first chunk…');
        player.src = `/api/stream/${currentToken}`;
        player.load();
      }

      try {
        await player.play();
      } catch (_) {
        // Autoplay may be blocked without a gesture; the visible controls let
        // the user start it manually.
        setStatus('working', 'Ready', 'Press play on the audio bar to begin.');
      }
      setGenerating(false);
    } catch (err) {
      setStatus('error', 'Network error',
        'Could not reach the local server. Is serve_audio.py running?', err.message);
      setGenerating(false);
    }
  }

  // ── Audio element events ─────────────────────────────────────────────────────
  player.addEventListener('playing', () => {
    if (!firstAudioShown) {
      firstAudioShown = true;
      const secs = ((performance.now() - streamStartedAt) / 1000).toFixed(1);
      ttfaBadge.textContent = currentCached
        ? `Played from saved MP3 in ${secs}s — no generation`
        : `First audio in ${secs}s — playing while the rest renders`;
      ttfaBadge.classList.add('visible');
    }
    setStatus('working', 'Playing…',
      currentCached ? 'Replaying the saved MP3.' : 'Streaming — later chunks still generating.');
  });
  player.addEventListener('waiting', () => {
    setStatus('working', 'Buffering…', 'Waiting for the next chunk to render.');
  });
  player.addEventListener('ended', () => {
    const title = titleInput.value.trim() || 'Untitled';
    setStatus('ready', 'Finished', 'Full render complete and cached for download.');
    activateDownload(currentToken, title);
    addToHistory(currentToken, title);
  });
  player.addEventListener('error', () => {
    if (!player.currentSrc) return;
    setStatus('error', 'Playback error', 'The audio stream failed. Check the server logs.');
    setGenerating(false);
  });

  generateBtn.addEventListener('click', async () => {
    const text = editorArea.value.trim();
    if (!text) { flashError('Paste some text first.'); return; }

    const title = titleInput.value.trim() || 'Untitled';
    const voice = document.querySelector('input[name="voice"]:checked')?.value || 'onyx';
    const speed = parseFloat(speedSlider.value);

    setGenerating(true);
    await startStream(text, title, voice, speed, selectedQuality);
  });

  // ── Download ───────────────────────────────────────────────────────────────
  function activateDownload(token, title) {
    if (!token) return;
    const safeTitle = title.replace(/[^a-z0-9]/gi, '-').replace(/-+/g, '-').toLowerCase() || 'audio';
    downloadBtn.href = `/api/download/${token}`;
    downloadBtn.setAttribute('download', safeTitle + '.mp3');
    downloadBtn.classList.add('visible');
  }

  // ── History ────────────────────────────────────────────────────────────────
  function addToHistory(token, title) {
    if (!token || history.some(h => h.token === token)) return;
    history.unshift({ token, title });
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) {
      historyList.innerHTML = '<div class="history-empty">No renders yet this session</div>';
      return;
    }
    historyList.innerHTML = history.slice(0, 8).map(h => {
      const safeTitle = h.title.replace(/[^a-z0-9]/gi, '-').replace(/-+/g, '-').toLowerCase() || 'audio';
      return `<div class="history-item">
        <span class="hi-icon">🎵</span>
        <span class="hi-title" title="${h.title}">${h.title}</span>
        <button class="hi-dl" data-replay="${h.token}">Replay</button>
        <a class="hi-dl" href="/api/download/${h.token}" download="${safeTitle}.mp3">Download</a>
      </div>`;
    }).join('');
  }

  // Replay a cached render — the server serves it instantly from cache (no re-gen).
  historyList.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-replay]');
    if (!btn) return;
    const token = btn.dataset.replay;
    const item = history.find(h => h.token === token);
    currentToken = token;
    currentCached = true;
    firstAudioShown = true; // cached replay — no time-to-first-audio badge
    ttfaBadge.classList.remove('visible');
    playerWrap.classList.add('visible');
    player.src = `/api/stream/${token}`;
    player.load();
    player.play().catch(() => {});
    setStatus('working', 'Playing…', `Replaying "${item ? item.title : 'render'}" from cache.`);
  });

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function setGenerating(on) {
    generateBtn.disabled = on;
    if (on) {
      generateIcon.textContent = '⏳';
      generateLabel.textContent = 'Preparing…';
      statusCard.classList.add('visible');
    } else {
      generateIcon.textContent = '▶';
      generateLabel.textContent = 'Play';
    }
  }

  const dotStates = { queued: 'queued', working: 'working', ready: 'ready', error: 'error' };
  function setStatus(state, label, detail, errorCode) {
    statusCard.classList.add('visible');
    statusDot.className = 'status-dot ' + (dotStates[state] || '');
    statusLabel.textContent = label;
    statusDetail.textContent = detail || '';
    statusDetail.className = 'status-detail' + (state === 'error' ? ' is-error' : '');
    if (errorCode) {
      statusErrorCode.textContent = errorCode;
      statusErrorCode.classList.add('visible');
    } else {
      statusErrorCode.textContent = '';
      statusErrorCode.classList.remove('visible');
    }
  }

  function flashError(msg) {
    statusCard.classList.add('visible');
    setStatus('error', msg, '', '');
    setTimeout(() => statusCard.classList.remove('visible'), 3000);
  }
</script>
</body>
</html>
